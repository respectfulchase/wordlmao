<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>WORDLMAO</title>

  <!--
    FILES (modular):
    - /index.html   (this file)
    - /styles.css   (all CSS)
    - /game.js      (all game logic)

    Netlify: put all 3 files in the same published folder.
  -->

  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./game.js" defer></script>
</head>

<body>
  <div class="app">
    <div class="frame">
      <div class="topbar">
        <div>
          <div class="title" id="titleBtn">WORDLMAO</div>
          <div class="date" id="dateLabel"></div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" id="modeBtn" aria-label="Mode" title="Mode">
            <span class="mode-ic" id="modeIcon">🙂</span>
          </button>

          <button class="icon-btn" id="shareBtn" aria-label="Share" title="Share">
            <svg class="share-ic" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l4 4h-3v7h-2V7H8l4-4z"></path>
              <path d="M6 10v9h12v-9h2v11H4V10h2z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="playwrap">
        <div class="playarea">
          <div class="board" id="board" aria-label="Word board"></div>
          <div class="msg" id="msg" aria-live="polite"></div>
          <div class="kb" id="kb" aria-label="Keyboard"></div>
        </div>
      </div>
    </div>
  </div>

  <noscript style="color:#fff; padding:16px; display:block; font-family:system-ui;">
    This game needs JavaScript enabled.
  </noscript>
</body>

</html>
