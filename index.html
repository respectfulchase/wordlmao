<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1" />
  <title>WORDLMAO</title>

  <style>
    :root {
      --bg: #0b0b0d;

      /* NYT-ish base grays */
      --tile-empty: #3a3a3c;
      --key: #818384;
      --key-text: #ffffff;

      /* Locked palette */
      --correct: #538D4E;
      /* green */
      --present: #2F7F8A;
      /* teal */
      --absent: #3A3A3C;
      /* charcoal */

      --text: #ffffff;
      --muted: #bdbdbf;

      --font: system-ui, -apple-system, "Helvetica Neue", Arial, sans-serif;

      /* Core sizing */
      --gap: 6px;

      /* Keyboard width clamp */
      --kb-max: 520px;
      --kb-w: min(var(--kb-max), 92vw);

      /* Key height clamp */
      --key-h: clamp(44px, 6.2vw, 58px);

      /* Key corner radius (slightly less rounded like NYT) */
      --key-r: 6px;

      /* Wide key multiplier */
      --wide-mult: 1.5;

      /* Letter-key width derived from kb width (10 keys + 9 gaps) */
      --key-w: calc((var(--kb-w) - (9 * var(--gap))) / 10);

      /* Board tiles tied to the same scale (tweak multiplier if desired) */
      --tile: clamp(44px, calc(var(--key-w) * 1.10), 64px);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      overscroll-behavior: none;

      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
      padding-left: env(safe-area-inset-left);
      padding-right: env(safe-area-inset-right);
    }

    /* App skeleton */
    .app {
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .topbar {
      width: 100%;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 14px;
      border-bottom: 1px solid #2a2a2c;
    }

    .title {
      font-weight: 900;
      letter-spacing: .5px;
      text-transform: uppercase;
      font-size: 26px;
      line-height: 1;
      margin: 0;
    }

    .date {
      margin: 2px 0 0 0;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .6px;
      text-transform: uppercase;
    }

    /* Frame: centered column wrapper for header + play area */
    .frame {
      width: var(--kb-w);
      margin: 0 auto;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    /* Share / mode buttons */
    .icon-btn {
      width: 64px;
      height: 64px;
      border: 0;
      background: transparent;
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 14px;
      cursor: pointer;
      touch-action: manipulation;
    }

    .icon-btn:active {
      opacity: .65;
    }

    /* Share button disabled (keeps layout, still clickable to show message) */
    .icon-btn.disabled {
      opacity: .35;
    }

    .icon-btn.disabled:active {
      opacity: .35;
    }

    .share-ic {
      width: 40px;
      height: 40px;
      fill: currentColor;
      opacity: .95;
    }

    .top-actions {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .mode-ic {
      font-size: 28px;
      line-height: 1;
    }

    /* Centered play area: board + msg + keyboard */
    .playwrap {
      width: 100%;
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 12px 0;
    }

    .playarea {
      width: var(--kb-w);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
    }

    /* Board */
    .board {
      width: calc((var(--tile) * 5) + (var(--gap) * 4));
      display: grid;
      grid-template-rows: repeat(6, var(--tile));
      gap: var(--gap);
    }

    .row {
      display: grid;
      grid-template-columns: repeat(5, var(--tile));
      gap: var(--gap);
    }

    .tile {
      width: var(--tile);
      height: var(--tile);
      background: var(--tile-empty);
      opacity: .35;
      display: flex;
      align-items: center;
      justify-content: center;

      border-radius: 0;
      /* sharp tiles */
      font-weight: 900;
      text-transform: uppercase;
      font-size: calc(var(--tile) * 0.55);
      line-height: 1;
      color: var(--text);
      touch-action: manipulation;
    }

    .tile.pinned {
      outline: 2px solid rgba(255, 255, 255, 0.55);
      outline-offset: -2px;
    }

    .tile.filled {
      opacity: 1;
    }

    /* Selected tile highlight: subtle gray fill, no outline */
    .tile.cursor {
      outline: none;
      background: #4a4a4c;
      opacity: 1;
    }

    /* Result colors */
    .tile.correct {
      background: var(--correct);
      opacity: 1;
    }

    .tile.present {
      background: var(--present);
      opacity: 1;
    }

    .tile.absent {
      background: var(--absent);
      opacity: 1;
    }

    .tile.hidden {
      opacity: 0;
      background: transparent;
    }

    /* Message */
    .msg {
      min-height: 18px;
      width: 100%;
      text-align: center;
      color: var(--muted);
      font-size: 13px;
      letter-spacing: .2px;
      text-transform: uppercase;
    }

    /* Keyboard */
    .kb {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: var(--gap);
    }

    /* Top ENTER bar */
    .clearbar {
      height: calc(var(--key-h) * 1);
      border-radius: var(--key-r);
      background: #6f7072;
      color: var(--key-text);
      border: 0;
      font-weight: 900;
      letter-spacing: .8px;
      text-transform: uppercase;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      width: 100%;
      touch-action: manipulation;

      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .clearbar:active {
      filter: brightness(.92);
    }

    /* Rows */
    .kb-row {
      display: flex;
      justify-content: center;
      gap: var(--gap);
      width: fit-content;
      margin: 0 auto;
    }

    /* Force letter keys to same width everywhere */
    .key {
      width: var(--key-w);
      height: var(--key-h);
      border-radius: var(--key-r);
      background: var(--key);
      color: var(--key-text);
      border: 0;
      font-weight: 900;
      text-transform: uppercase;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      min-width: 0;
      touch-action: manipulation;

      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .key:active {
      filter: brightness(.92);
    }

    /* Remove browser focus ring for game buttons */
    .key:focus,
    .key:focus-visible,
    .clearbar:focus,
    .clearbar:focus-visible,
    .icon-btn:focus,
    .icon-btn:focus-visible {
      outline: none;
      box-shadow: none;
    }

    /* Wide keys (CLEAR, ⌫) */
    .key.wide {
      width: calc(var(--key-w) * var(--wide-mult));
      padding: 0 8px;
      font-size: clamp(9px, 2.6vw, 13px);
      letter-spacing: .5px;
    }

    /* Used key coloring (same as grid) */
    .k-correct {
      background: var(--correct);
    }

    .k-present {
      background: var(--present);
    }

    .k-absent {
      background: var(--absent);
    }

    .key.used {
      opacity: .95;
    }

    /* Mobile: make the whole play area (board + keyboard) fill more of the screen */
    @media (max-width: 899px) {
      :root {
        --kb-w: min(var(--kb-max), 98vw);

        /* Make the grid larger on mobile without changing keyboard key sizes */
        --tile: clamp(52px, calc(var(--key-w) * 1.45), 78px);
      }
    }

    /* Desktop */
    @media (min-width: 900px) {
      :root {
        --tile: clamp(44px, calc(var(--key-w) * 1.3), 76px);
      }

      .topbar {
        padding: 18px 18px 10px;
      }

      .playwrap {
        padding: 18px;
      }

      .playarea {
        gap: 14px;
      }

      .msg {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="app">
    <div class="frame">
      <div class="topbar">
        <div>
          <div class="title" id="titleBtn">WORDLMAO</div>
          <div class="date" id="dateLabel"></div>
        </div>

        <div class="top-actions">
          <button class="icon-btn" id="modeBtn" aria-label="Mode" title="Mode">
            <span class="mode-ic" id="modeIcon">🙂</span>
          </button>

          <button class="icon-btn" id="shareBtn" aria-label="Share">
            <svg class="share-ic" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M12 3l4 4h-3v7h-2V7H8l4-4z"></path>
              <path d="M6 10v9h12v-9h2v11H4V10h2z"></path>
            </svg>
          </button>
        </div>
      </div>

      <div class="playwrap">
        <div class="playarea">
          <div class="board" id="board" aria-label="Word board"></div>
          <div class="msg" id="msg"></div>
          <div class="kb" id="kb" aria-label="Keyboard"></div>
        </div>
      </div>
    </div>

    <script>
      // ---------- Word lists ----------
      const WORDLES_URL = "https://raw.githubusercontent.com/stuartpb/wordles/main/wordles.json";
      const NONWORDLES_URL = "https://raw.githubusercontent.com/stuartpb/wordles/main/nonwordles.json";

      const BLOCKLIST = new Set([]);
      const ALLOWLIST = new Set([]);

      const FALLBACK_ANSWERS = [
        "about", "above", "actor", "adopt", "after", "alert", "alive", "angle", "apple", "arena",
        "beach", "black", "bread", "bring", "brown", "build", "chair", "clean", "clear", "clock",
        "dream", "drive", "earth", "eight", "enjoy", "enter", "faith", "field", "fight", "final",
        "fresh", "front", "grace", "great", "green", "group", "heart", "honey", "house", "image",
        "judge", "laugh", "learn", "light", "music", "north", "peace", "power", "proud", "quick",
        "reach", "right", "royal", "scale", "scene", "share", "smart", "smile", "sound", "south",
        "space", "stage", "store", "story", "teach", "their", "think", "three", "today", "touch",
        "truth", "union", "value", "voice", "watch", "water", "where", "while", "white", "world", "young"
      ];

      function isFive(w) { return /^[a-z]{5}$/.test(w); }

      function filterAnswerCandidates(words) {
        const set = new Set(words);
        const keep = [];
        for (const w of words) {
          if (!isFive(w)) continue;

          if (ALLOWLIST.has(w)) { keep.push(w); continue; }
          if (BLOCKLIST.has(w)) continue;

          // plural filter
          if (w.endsWith("s") && !w.endsWith("ss")) {
            const singular = w.slice(0, -1);
            if (set.has(singular)) continue;
          }
          // -ed filter
          if (w.endsWith("ed")) {
            const base1 = w.slice(0, -2);
            const base2 = w.slice(0, -1);
            if (set.has(base1) || set.has(base2)) continue;
          }
          // -ing filter
          if (w.endsWith("ing")) {
            const base = w.slice(0, -3);
            if (set.has(base)) continue;
          }

          keep.push(w);
        }
        return keep;
      }

      async function loadWordLists() {
        const cacheKey = "wordlite_lists_v1";
        const cached = localStorage.getItem(cacheKey);
        if (cached) {
          try { return JSON.parse(cached); } catch { }
        }
        try {
          const [answersRaw, guessesRaw] = await Promise.all([
            fetch(WORDLES_URL).then(r => r.json()),
            fetch(NONWORDLES_URL).then(r => r.json())
          ]);
          const answers = filterAnswerCandidates(
            answersRaw.map(String).map(w => w.toLowerCase()).filter(isFive)
          );
          const guessesOnly = guessesRaw.map(String).map(w => w.toLowerCase()).filter(isFive);
          const valid = Array.from(new Set([...answers, ...guessesOnly]));
          const result = { answers, guessesOnly, valid };
          localStorage.setItem(cacheKey, JSON.stringify(result));
          return result;
        } catch {
          const answers = filterAnswerCandidates(FALLBACK_ANSWERS.slice());
          const valid = Array.from(new Set([...answers]));
          return { answers, guessesOnly: [], valid };
        }
      }

      // Deterministic daily answer
      function mulberry32(seed) {
        return function () {
          let t = seed += 0x6D2B79F5;
          t = Math.imul(t ^ (t >>> 15), t | 1);
          t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
          return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
        };
      }
      function seededShuffle(arr, seed) {
        const a = arr.slice();
        const rand = mulberry32(seed);
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(rand() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }
      function dayNumberLocal() {
        const d = new Date();
        const y = d.getFullYear();
        const m = d.getMonth();
        const day = d.getDate();
        const base = Date.UTC(2022, 0, 1);
        const utcMid = Date.UTC(y, m, day);
        return Math.floor((utcMid - base) / 86400000);
      }
      function pickDailyAnswer(answers) {
        const dn = dayNumberLocal();
        const schedule = seededShuffle(answers, 1337);
        return schedule[((dn % schedule.length) + schedule.length) % schedule.length];
      }

      // ---------- Game ----------
      const ROWS = 6, COLS = 5;

      const boardEl = document.getElementById("board");
      const kbEl = document.getElementById("kb");
      const msgEl = document.getElementById("msg");
      const dateLabelEl = document.getElementById("dateLabel");
      const shareBtn = document.getElementById("shareBtn");
      const modeBtn = document.getElementById("modeBtn");
      const modeIconEl = document.getElementById("modeIcon");

      let ANSWER = null;     // uppercase
      let VALID = null;      // Set lowercase
      let gameOver = false;

      const INPUT_ROW = 5;   // always type on the bottom row
      let guessCount = 0;    // number of submitted guesses

      let currentRow = INPUT_ROW;
      let currentCol = 0;

      // If true: user tapped a tile, so typing should stay on that tile (no auto-advance)
      let manualSelect = false;

      // Track submitted guesses so users can't submit the same word twice
      let guessedSet = new Set();

      // Pinned columns on the input row (row 5). True = locked.
      let pinnedCols = Array(COLS).fill(false);

      // Mobile long-press pinning: prevent the follow-up click from also firing
      let suppressNextClick = false;

      // ---------- Modes ----------
      const MODES = [
        { key: "normal", icon: "🙂", maxGuesses: 6, hard: false, desc: "NORMAL MODE. TAP 🙂 TO CHANGE." },
        { key: "hard", icon: "🧠", maxGuesses: 6, hard: true, desc: "HARD MODE. USE ALL HINTS." },
        { key: "extreme", icon: "💀", maxGuesses: 4, hard: true, desc: "EXTREME. HARD MODE, 4 GUESSES." },
        { key: "insanity", icon: "☠️", maxGuesses: 3, hard: true, desc: "INSANITY. 3 GUESSES. WHAT ARE YOU THINKING?" }
      ];
      let modeIndex = 0;

      // Persist preferred mode across days (separate from per-day game state)
      const MODE_PREF_KEY = "wordlmao_mode_pref_v1";
      function saveModePreference() {
        try { localStorage.setItem(MODE_PREF_KEY, mode().key); } catch { }
      }
      function loadModePreferenceKey() {
        try { return localStorage.getItem(MODE_PREF_KEY); } catch { return null; }
      }
      function mode() { return MODES[modeIndex]; }
      function setModeByKey(key) {
        const idx = MODES.findIndex(m => m.key === key);
        modeIndex = idx >= 0 ? idx : 0;
        if (modeIconEl) modeIconEl.textContent = mode().icon;
      }
      function setModeIndex(idx) {
        modeIndex = ((idx % MODES.length) + MODES.length) % MODES.length;
        if (modeIconEl) modeIconEl.textContent = mode().icon;
      }

      const grid = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => ""));
      const results = Array.from({ length: ROWS }, () => Array.from({ length: COLS }, () => ""));
      const keyState = new Map(); // letter -> correct/present/absent

      function setMsg(t) { msgEl.textContent = (t || "").toUpperCase(); }

      function todayLabel() {
        return new Date().toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" }).toUpperCase();
      }

      // ---------- Puzzle counter (DATE • 001) ----------
      // Set this ON LAUNCH DAY to whatever dayNumberLocal() returns that day.
      // Example: open the console on launch day and run: dayNumberLocal()
      // Then replace the 0 below with that number.
      // Feb 24, 2026 (local date) corresponds to dayNumberLocal() = 1515 with the current base (Jan 1, 2022).
      // If you ever change dayNumberLocal()'s base logic, recalc this.
      const LAUNCH_DAY_NUMBER = 1515;

      function pad3(n) {
        const s = String(Math.max(0, n));
        return s.length >= 3 ? s : s.padStart(3, "0");
      }

      function puzzleNumber() {
        if (!LAUNCH_DAY_NUMBER) return 1;
        return (dayNumberLocal() - LAUNCH_DAY_NUMBER) + 1;
      }

      function dateWithCounterLabel() {
        return `${todayLabel()} • ${pad3(puzzleNumber())}`;
      }

      function tileEl(r, c) {
        return boardEl.querySelector(`.tile[data-row="${r}"][data-col="${c}"]`);
      }

      function rowIsFull(r) {
        for (let c = 0; c < COLS; c++) if (!grid[r][c]) return false;
        return true;
      }

      function rowWord(r) { return grid[r].join(""); }

      function gameHasStarted() {
        return guessedSet.size > 0 || guessCount > 0 || results.some(r => r.some(Boolean));
      }

      function showModeDesc() {
        setMsg(mode().desc);
      }

      function editTile(r, c) {
        if (gameOver) return;
        if (r !== INPUT_ROW) return;

        currentRow = INPUT_ROW;
        currentCol = c;
        manualSelect = true;

        render();

        const rowEmpty = grid[currentRow].every(ch => !ch);
        if (rowEmpty && !gameHasStarted()) {
          showModeDesc();
        } else {
          setMsg("");
        }

        saveGameState();
      }

      function togglePinAt(col) {
        if (gameOver) return;
        if (!grid[INPUT_ROW][col]) return; // only if filled

        pinnedCols[col] = !pinnedCols[col];

        if (pinnedCols[col] && currentCol === col) {
          const first = nextUnpinnedCol(0);
          if (first !== -1) currentCol = first;
        }

        manualSelect = true;
        render();
        saveGameState();
      }

      function buildBoard() {
        boardEl.innerHTML = "";
        for (let r = 0; r < ROWS; r++) {
          const row = document.createElement("div");
          row.className = "row";
          row.dataset.row = r;

          for (let c = 0; c < COLS; c++) {
            const t = document.createElement("div");
            t.className = "tile";
            t.dataset.row = r;
            t.dataset.col = c;

            t.addEventListener("click", () => {
              if (suppressNextClick) {
                suppressNextClick = false;
                return;
              }
              editTile(r, c);
            });

            // Mobile pinning: long-press to toggle pin (only on input row)
            let pressTimer = null;
            let startX = 0;
            let startY = 0;
            let longPressed = false;

            t.addEventListener("touchstart", (e) => {
              if (gameOver) return;
              if (r !== INPUT_ROW) return;
              if (!e.touches || !e.touches[0]) return;

              longPressed = false;
              const t0 = e.touches[0];
              startX = t0.clientX;
              startY = t0.clientY;

              pressTimer = setTimeout(() => {
                togglePinAt(c);
                longPressed = true;
                suppressNextClick = true;
              }, 260);
            }, { passive: true });

            t.addEventListener("touchmove", (e) => {
              if (!pressTimer || !e.touches || !e.touches[0]) return;
              const t0 = e.touches[0];
              const dx = t0.clientX - startX;
              const dy = t0.clientY - startY;
              if (Math.hypot(dx, dy) > 10) {
                clearTimeout(pressTimer);
                pressTimer = null;
              }
            }, { passive: true });

            t.addEventListener("touchend", (e) => {
              if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
              }
              if (longPressed) {
                suppressNextClick = true;
                e.preventDefault();
              }
            }, { passive: false });

            t.addEventListener("touchcancel", () => {
              if (pressTimer) {
                clearTimeout(pressTimer);
                pressTimer = null;
              }
              longPressed = false;
            });

            // Desktop pinning: right-click a tile to toggle pin
            t.addEventListener("contextmenu", (e) => {
              e.preventDefault();
              if (r !== INPUT_ROW) return;
              togglePinAt(c);
            });

            row.appendChild(t);
          }

          boardEl.appendChild(row);
        }
        render();
      }

      function render() {
        const visibleRows = Math.min(guessCount + 1, ROWS);
        const hideAbove = ROWS - visibleRows;

        for (let r = 0; r < ROWS; r++) {
          const rowScored = results[r].some(Boolean);

          for (let c = 0; c < COLS; c++) {
            const t = tileEl(r, c);
            const ch = grid[r][c];

            t.textContent = ch;
            t.classList.toggle("filled", !!ch);
            t.classList.toggle("hidden", r < hideAbove);
            t.classList.toggle("pinned", (r === INPUT_ROW && pinnedCols[c]));

            t.classList.toggle(
              "cursor",
              (!gameOver && r === INPUT_ROW && c === currentCol && !rowScored)
            );

            t.classList.remove("correct", "present", "absent");
            if (results[r][c]) t.classList.add(results[r][c]);
          }
        }
      }

      function buildKeyboard() {
        kbEl.innerHTML = "";

        const enterBar = document.createElement("button");
        enterBar.type = "button";
        enterBar.className = "clearbar";
        enterBar.textContent = "ENTER";
        enterBar.addEventListener("click", () => {
          submitGuess();
          enterBar.blur();
        });
        kbEl.appendChild(enterBar);

        const rows = [
          ["Q", "W", "E", "R", "T", "Y", "U", "I", "O", "P"],
          ["A", "S", "D", "F", "G", "H", "J", "K", "L"],
          ["CLEAR", "Z", "X", "C", "V", "B", "N", "M", "⌫"]
        ];

        rows.forEach((letters, idx) => {
          const row = document.createElement("div");
          row.className = "kb-row";

          if (idx === 1) {
            row.style.width = "calc(100% - (var(--key-w) + var(--gap)))";
          }

          for (const label of letters) {
            const btn = document.createElement("button");
            btn.type = "button";
            btn.className = "key" + ((label === "CLEAR" || label === "⌫") ? " wide" : "");
            btn.textContent = label;
            btn.dataset.key = label;

            btn.addEventListener("click", () => {
              if (label === "CLEAR") clearRow();
              else if (label === "⌫") backspace();
              else onKey(label);

              // Remove focus so physical keyboard doesn't highlight virtual key
              btn.blur();
            });

            row.appendChild(btn);
          }

          kbEl.appendChild(row);
        });

        renderKeyboard();
      }

      function renderKeyboard() {
        const keys = kbEl.querySelectorAll(".key");
        keys.forEach(k => {
          const label = k.dataset.key;
          if (!label || label.length !== 1) return;

          k.classList.remove("k-correct", "k-present", "k-absent", "used");
          const st = keyState.get(label);
          if (st === "correct") k.classList.add("k-correct", "used");
          else if (st === "present") k.classList.add("k-present", "used");
          else if (st === "absent") k.classList.add("k-absent", "used");
        });
      }

      function onKey(label) {
        if (gameOver) return;
        if (/^[A-Z]$/.test(label)) insertLetter(label);
      }

      function nextUnpinnedCol(fromCol) {
        for (let step = 0; step < COLS; step++) {
          const c = (fromCol + step) % COLS;
          if (!pinnedCols[c]) return c;
        }
        return -1;
      }

      function insertLetter(letter) {
        if (gameOver) return;

        currentRow = INPUT_ROW;

        if (pinnedCols[currentCol]) {
          const c = nextUnpinnedCol(currentCol + 1);
          if (c === -1) {
            setMsg("All tiles are pinned.");
            return;
          }
          currentCol = c;
        }

        grid[currentRow][currentCol] = letter.toUpperCase();

        if (!manualSelect && currentCol < COLS - 1) {
          let nc = currentCol + 1;
          while (nc < COLS && pinnedCols[nc]) nc++;
          if (nc < COLS) currentCol = nc;
        }

        render();
        setMsg("");
        saveGameState();
      }

      function backspace() {
        if (gameOver) return;

        currentRow = INPUT_ROW;
        manualSelect = false;

        if (!pinnedCols[currentCol] && grid[currentRow][currentCol]) {
          grid[currentRow][currentCol] = "";
          render();
          saveGameState();
          return;
        }

        let c = currentCol - 1;
        while (c >= 0 && pinnedCols[c]) c--;

        if (c >= 0) {
          currentCol = c;
          if (grid[currentRow][currentCol]) grid[currentRow][currentCol] = "";
          render();
          saveGameState();
          return;
        }
      }

      function clearRow() {
        if (gameOver) return;

        currentRow = INPUT_ROW;

        // Clear ONLY unpinned tiles
        for (let c = 0; c < COLS; c++) {
          if (pinnedCols[c]) continue;
          grid[currentRow][c] = "";
        }

        // CLEAR always exits manual mode and returns to normal typing behavior.
        manualSelect = false;

        // After clearing, jump cursor to the first EMPTY, unpinned tile (left to right).
        let target = -1;
        for (let c = 0; c < COLS; c++) {
          if (pinnedCols[c]) continue;
          if (!grid[currentRow][c]) { target = c; break; }
        }

        if (target === -1) {
          const first = nextUnpinnedCol(0);
          target = (first === -1) ? 0 : first;
        }

        currentCol = target;

        render();
        setMsg("");
        saveGameState();
      }

      function buildHardConstraints() {
        const greens = Array(COLS).fill("");
        const minCounts = {};

        for (let r = 0; r < ROWS; r++) {
          if (!results[r].some(Boolean)) continue;

          const rowCounts = {};
          for (let c = 0; c < COLS; c++) {
            const st = results[r][c];
            const ch = (grid[r][c] || "").toUpperCase();
            if (!ch) continue;

            if (st === "correct") {
              greens[c] = ch;
              rowCounts[ch] = (rowCounts[ch] || 0) + 1;
            } else if (st === "present") {
              rowCounts[ch] = (rowCounts[ch] || 0) + 1;
            }
          }

          for (const [ch, ct] of Object.entries(rowCounts)) {
            minCounts[ch] = Math.max(minCounts[ch] || 0, ct);
          }
        }

        return { greens, minCounts };
      }

      function hardModeValidate(guess) {
        const g = guess.toUpperCase();
        const { greens, minCounts } = buildHardConstraints();

        const wrongGreens = [];
        for (let c = 0; c < COLS; c++) {
          if (greens[c] && g[c] !== greens[c]) {
            wrongGreens.push(`${greens[c]} IN ${c + 1}`);
          }
        }
        if (wrongGreens.length) {
          return { ok: false, msg: `HARD MODE: KEEP ${wrongGreens.join(", ")}.` };
        }

        const counts = {};
        for (const ch of g) counts[ch] = (counts[ch] || 0) + 1;

        const missing = [];
        const reqLetters = Object.keys(minCounts).sort();
        for (const ch of reqLetters) {
          const need = minCounts[ch] || 0;
          if (need <= 0) continue;
          if ((counts[ch] || 0) < need) missing.push(ch);
        }

        if (missing.length) {
          return { ok: false, msg: `HARD MODE: INCLUDE ${missing.join(", ")}.` };
        }

        return { ok: true };
      }

      function scoreGuess(guess, answer) {
        const g = guess.split("");
        const a = answer.split("");
        const res = Array(COLS).fill("absent");

        const remaining = {};
        for (let i = 0; i < COLS; i++) {
          if (g[i] === a[i]) {
            res[i] = "correct";
          } else {
            remaining[a[i]] = (remaining[a[i]] || 0) + 1;
          }
        }
        for (let i = 0; i < COLS; i++) {
          if (res[i] === "correct") continue;
          const ch = g[i];
          if (remaining[ch] > 0) {
            res[i] = "present";
            remaining[ch]--;
          }
        }
        return res;
      }

      function updateKeyStates(guess, res) {
        const rank = (s) => s === "correct" ? 3 : s === "present" ? 2 : s === "absent" ? 1 : 0;
        for (let i = 0; i < COLS; i++) {
          const ch = guess[i];
          const next = res[i];
          const prev = keyState.get(ch);
          if (!prev || rank(next) > rank(prev)) keyState.set(ch, next);
        }
      }

      function shiftLockedUpOne() {
        for (let r = 0; r <= 3; r++) {
          grid[r] = grid[r + 1].slice();
          results[r] = results[r + 1].slice();
        }

        grid[4] = Array.from({ length: COLS }, () => "");
        results[4] = Array.from({ length: COLS }, () => "");

        results[INPUT_ROW] = Array.from({ length: COLS }, () => "");
      }

      function rebuildKeyStateFromBoard() {
        keyState.clear();

        for (let r = 0; r < ROWS; r++) {
          if (!results[r].some(Boolean)) continue;
          const guess = rowWord(r);
          updateKeyStates(guess, results[r]);
        }

        renderKeyboard();
      }

      function submitGuess() {
        if (gameOver) return;

        currentRow = INPUT_ROW;

        if (!rowIsFull(INPUT_ROW)) {
          setMsg("Fill all 5 tiles first.");
          return;
        }

        const guess = rowWord(INPUT_ROW);
        const guessLower = guess.toLowerCase();

        if (!VALID || !VALID.has(guessLower)) {
          setMsg("Not in word list.");
          return;
        }

        if (guessedSet.has(guessLower)) {
          setMsg("Hey, you already guessed that.");
          return;
        }

        // Hard/Extreme/Insanity: enforce revealed hints
        if (mode().hard && gameHasStarted()) {
          const check = hardModeValidate(guess);
          if (!check.ok) {
            setMsg(check.msg);
            return;
          }
        }

        const res = scoreGuess(guess, ANSWER);
        guessedSet.add(guessLower);

        if (res.every(x => x === "correct")) {
          results[INPUT_ROW] = res.slice();
          updateKeyStates(guess, res);

          manualSelect = false;
          renderKeyboard();
          render();

          setMsg("Nice. You got it.");
          gameOver = true;

          updateShareButton();
          saveGameState();
          return;
        }

        if (guessCount === (mode().maxGuesses - 1)) {
          results[INPUT_ROW] = res.slice();
          updateKeyStates(guess, res);

          manualSelect = false;
          renderKeyboard();
          render();

          setMsg(`Answer: ${ANSWER}`);
          gameOver = true;

          updateShareButton();
          saveGameState();
          return;
        }

        // Decide which pinned letters should carry forward:
        // - Only keep/carry pins that scored GREEN (correct)
        // - If pinned but not green, unpin and do not carry
        const carryLetters = Array(COLS).fill("");
        const nextPinned = pinnedCols.slice();
        const removedPins = [];
        for (let c = 0; c < COLS; c++) {
          if (!pinnedCols[c]) continue;
          if (res[c] === "correct") {
            carryLetters[c] = grid[INPUT_ROW][c];
          } else {
            removedPins.push(grid[INPUT_ROW][c]);
            nextPinned[c] = false;
          }
        }

        shiftLockedUpOne();

        for (let c = 0; c < COLS; c++) grid[4][c] = grid[INPUT_ROW][c];
        results[4] = res.slice();

        for (let c = 0; c < COLS; c++) grid[INPUT_ROW][c] = "";

        pinnedCols = nextPinned;
        for (let c = 0; c < COLS; c++) {
          if (pinnedCols[c]) grid[INPUT_ROW][c] = carryLetters[c];
        }

        const first = nextUnpinnedCol(0);
        currentCol = (first === -1) ? 0 : first;

        manualSelect = false;
        guessCount++;

        rebuildKeyStateFromBoard();
        render();

        if (removedPins.length) {
          const letters = removedPins.join(", ");
          setMsg(`Pin cleared: ${letters} not correct.`);
        } else {
          setMsg("");
        }

        saveGameState();
      }

      // ---------- Share ----------
      function squareFor(cell) {
        if (cell === "correct") return "🟩";
        if (cell === "present") return "🟦";
        if (cell === "absent") return "⬛";
        return "⬛";
      }

      function buildShareText() {
        // Compact share format:
        // https://wordlmao.chasedunham.com
        // 🧠 005 3/6
        // ⬛️🟦🟩⬛️⬛️

        const won = results.some(r => r.length && r.every(x => x === "correct"));
        const tries = won ? String(guessCount + 1) : "0";

        const lines = [];
        lines.push("https://wordlmao.chasedunham.com");
        lines.push(`${mode().icon} ${pad3(puzzleNumber())} ${tries}/${mode().maxGuesses}`);

        // Only include rows that have been scored (submitted guesses)
        for (let r = 0; r < ROWS; r++) {
          if (!results[r].some(Boolean)) continue;
          lines.push(results[r].map(squareFor).join(""));
        }

        return lines.join("
");
            }

      async function shareResults() {
        const text = buildShareText();

        if (navigator.share) {
          try {
            await navigator.share({
              title: "WORDLMAO",
              text
            });
            return;
          } catch { }
        }

        try {
          await navigator.clipboard.writeText(text);
          setMsg("Copied results to clipboard.");
        } catch {
          setMsg("Could not copy.");
        }
      }

      function stateKey() {
        return "wordlite_state_" + dayNumberLocal();
      }

      function saveGameState() {
        try {
          const obj = {
            v: 1,
            day: dayNumberLocal(),
            answer: ANSWER,
            gameOver,
            modeKey: mode().key,
            guessCount,
            currentCol,
            manualSelect,
            guessed: Array.from(guessedSet),
            pinnedCols,
            grid,
            results,
            keyState: Array.from(keyState.entries()),
            msg: msgEl.textContent || ""
          };
          localStorage.setItem(stateKey(), JSON.stringify(obj));
        } catch { }
      }

      function loadGameState() {
        try {
          const raw = localStorage.getItem(stateKey());
          if (!raw) return false;

          const obj = JSON.parse(raw);
          if (!obj || obj.day !== dayNumberLocal() || obj.answer !== ANSWER) return false;

          gameOver = !!obj.gameOver;
          setModeByKey(obj.modeKey || "normal");
          guessCount = Number(obj.guessCount || 0);
          currentCol = Number(obj.currentCol || 0);
          manualSelect = !!obj.manualSelect;

          guessedSet = new Set(Array.isArray(obj.guessed) ? obj.guessed : []);

          pinnedCols = Array.isArray(obj.pinnedCols) && obj.pinnedCols.length === COLS
            ? obj.pinnedCols.map(Boolean)
            : Array(COLS).fill(false);

          for (let r = 0; r < ROWS; r++) {
            for (let c = 0; c < COLS; c++) {
              grid[r][c] = (obj.grid?.[r]?.[c] || "");
              results[r][c] = (obj.results?.[r]?.[c] || "");
            }
          }

          keyState.clear();
          for (const [k, v] of (obj.keyState || [])) keyState.set(k, v);

          setMsg(obj.msg || "");
          return true;
        } catch {
          return false;
        }
      }

      function resetTodayForTesting() {
        try {
          localStorage.removeItem(stateKey());
        } catch { }
        location.reload();
      }

      // ---------- Tiny self-tests (console only) ----------
      function runSelfTests() {
        try {
          const s = ["A", "B"].join("\n");
          console.assert(s === "A\nB", "newline join test failed");
          console.assert(MODES.length === 4 && MODES.every(m => m.icon), "mode icon test failed");

          // Share text should contain at least the header and PLAY line
          const share = buildShareText();
          console.assert(share.includes("WORDLMAO"), "share header missing");
          console.assert(share.includes("PLAY:"), "share PLAY line missing");
        } catch { }
      }

      function updateShareButton() {
        if (!shareBtn) return;
        const disabled = !gameOver;
        shareBtn.classList.toggle("disabled", disabled);
        shareBtn.setAttribute("aria-disabled", String(disabled));
        shareBtn.title = disabled ? "Finish the puzzle to share" : "Share";
      }

      shareBtn.addEventListener("click", () => {
        if (!gameOver) {
          setMsg("Finish the puzzle to share.");
          return;
        }
        shareResults();
      });

      if (modeBtn) {
        modeBtn.addEventListener("click", () => {
          if (gameOver || gameHasStarted()) {
            setMsg("MODE LOCKED THIS GAME.");
            return;
          }
          setModeIndex(modeIndex + 1);
          saveModePreference();
          showModeDesc();
          saveGameState();
          modeBtn.blur();
        });
      }

      // DEV RESET (hidden)
      const titleBtn = document.getElementById("titleBtn");
      let tapCount = 0;
      let tapTimer = null;

      if (titleBtn) {
        titleBtn.addEventListener("dblclick", () => resetTodayForTesting());

        titleBtn.addEventListener("click", () => {
          tapCount++;
          clearTimeout(tapTimer);
          tapTimer = setTimeout(() => { tapCount = 0; }, 450);
          if (tapCount >= 3) resetTodayForTesting();
        });
      }

      window.addEventListener("keydown", (e) => {
        const k = e.key;

        if (e.shiftKey && (k === "R" || k === "r")) {
          resetTodayForTesting();
          return;
        }

        if (gameOver) return;

        // Arrow navigation (input row only)
        if (k === "ArrowLeft") {
          e.preventDefault();
          let c = currentCol - 1;
          while (c >= 0 && pinnedCols[c]) c--;
          if (c >= 0) {
            currentCol = c;
            manualSelect = true;
            render();
            saveGameState();
          }
          return;
        }

        if (k === "ArrowRight") {
          e.preventDefault();
          let c = currentCol + 1;
          while (c < COLS && pinnedCols[c]) c++;
          if (c < COLS) {
            currentCol = c;
            manualSelect = true;
            render();
            saveGameState();
          }
          return;
        }

        if (k === "Enter") submitGuess();
        else if (k === "Backspace") backspace();
        else if (/^[a-zA-Z]$/.test(k)) insertLetter(k.toUpperCase());
      });

      async function boot() {
        dateLabelEl.textContent = dateWithCounterLabel();
        setMsg("Loading...");

        // Default to the user's last-used mode (preference)
        const pref = loadModePreferenceKey();
        setModeByKey(pref || "normal");
        saveModePreference();

        const lists = await loadWordLists();
        VALID = new Set(lists.valid);
        ANSWER = pickDailyAnswer(lists.answers).toUpperCase();

        loadGameState();
        saveModePreference();

        updateShareButton();

        buildBoard();
        buildKeyboard();

        renderKeyboard();
        render();

        if (!msgEl.textContent || msgEl.textContent === "LOADING...") {
          if (!gameHasStarted() && !gameOver) showModeDesc();
          else setMsg("");
        }

        saveGameState();
        runSelfTests();
      }

      boot();
    </script>
</body>
